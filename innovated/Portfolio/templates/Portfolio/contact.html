{% extends 'Portfolio/base.html' %}

{% block title %}Contact - InnovatedHRTECH{% endblock %}

{% block content %}
<style>
    .contact-section {
        padding: 2rem 1.5rem;
        max-width: 800px;
        margin: 0 auto;
    }
    .contact-section h1 {
        color: #1a365d;
        text-align: center;
        margin-bottom: 1rem;
        font-size: 28px;
    }
    .contact-form {
        background: white;
        padding: 1.5rem;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .form-group {
        margin-bottom: 1rem;
    }
    .form-group label {
        display: block;
        margin-bottom: 0.35rem;
        color: #333;
        font-weight: 500;
        font-size: 14px;
    }
    .form-group input,
    .form-group textarea {
        width: 100%;
        padding: 0.6rem;
        border: 1px solid #ddd;
        border-radius: 5px;
        font-size: 14px;
    }
    .form-group textarea {
        min-height: 100px;
        resize: vertical;
    }
    .submit-button {
        background: #f97316;
        color: white;
        padding: 0.75rem 1.5rem;
        border: none;
        border-radius: 5px;
        font-size: 14px;
        cursor: pointer;
        width: 100%;
        transition: background 0.3s;
    }
    .submit-button:hover {
        background: #ea580c;
    }
    .contact-info {
        margin-top: 1.5rem;
        text-align: center;
        color: #666;
        font-size: 14px;
    }
</style>

<div class="contact-section">
    <h1>Contact Us</h1>
    <div class="contact-form">
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="subject">Subject</label>
                <input type="text" id="subject" name="subject" required>
            </div>
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" required></textarea>
            </div>
            <button type="submit" class="submit-button">Send Message</button>
        </form>
    </div>
    <div class="contact-info">
        <p>Or reach us directly at: info@innovatedhrtech.com</p>
    </div>
</div>
{% endblock %}
